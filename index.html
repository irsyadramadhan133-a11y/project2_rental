<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rental Laptop - Tugas Akhir</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; }
        .hidden { display: none !important; }
        
        /* Halaman Login */
        #loginPage { max-width: 350px; margin: 100px auto; padding: 30px; background: white; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Halaman Utama */
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .navbar { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; }
        .btn-login { background: #007bff; color: white; width: 100%; }
        .btn-add { background: #28a745; color: white; }
        .btn-logout { background: #dc3545; color: white; padding: 5px 15px; }
        .btn-pay { background: #007bff; color: white; }
        .card { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="loginPage">
    <h2>Rental Laptop</h2>
    <p>Silakan Login</p>
    <input type="text" id="user" placeholder="Username (bebas)">
    <input type="password" placeholder="Password">
    <button class="btn-login" onclick="masuk()">Login</button>
</div>

<div id="mainPage" class="hidden">
    <div class="navbar">
        <span>Dashboard Rental</span>
        <button class="btn-logout" onclick="keluar()">Logout</button>
    </div>

    <div class="container">
        <div class="section">
            <h3>Admin: Kelola Laptop</h3>
            <input type="text" id="namaLaptop" placeholder="Nama Laptop">
            <input type="number" id="hargaLaptop" placeholder="Harga/Hari">
            <input type="hidden" id="editIdx">
            <button class="btn-add" id="btnSimpan" onclick="simpanLaptop()">Simpan Laptop</button>
            
            <div id="listAdmin" style="margin-top:15px;"></div>
        </div>

        <div class="section">
            <h3>User: Katalog & Pembayaran</h3>
            <div id="listUser"></div>
            
            <div id="areaBayar" class="hidden" style="margin-top:20px; border-top: 2px dashed #ccc; padding-top:15px;">
                <h4 id="infoSewa"></h4>
                <input type="text" placeholder="Nama Pemesan">
                <select id="metode">
                    <option>Transfer Bank</option>
                    <option>QRIS / Dana</option>
                </select>
                <button class="btn-pay" onclick="prosesBayar()">Bayar Sekarang</button>
            </div>
        </div>
    </div>
</div>

<script>
    let dataLaptop = [
        { nama: "Thinkpad X1", harga: 300000 },
        { nama: "HP Victus", harga: 350000 }
    ];

    // Logika Login/Logout
    function masuk() {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('mainPage').classList.remove('hidden');
        renderData();
    }

    function keluar() {
        if(confirm("Yakin mau logout?")) {
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('mainPage').classList.add('hidden');
        }
    }

    // CRUD Admin
    function renderData() {
        const adminDiv = document.getElementById('listAdmin');
        const userDiv = document.getElementById('listUser');
        adminDiv.innerHTML = '';
        userDiv.innerHTML = '';

        dataLaptop.forEach((item, index) => {
            adminDiv.innerHTML += `
                <div class="card">
                    <span>${item.nama} - Rp${item.harga.toLocaleString()}</span>
                    <button onclick="editLappy(${index})">Edit</button>
                </div>`;
            
            userDiv.innerHTML += `
                <div class="card">
                    <span>${item.nama}</span>
                    <button class="btn-pay" onclick="pilihLappy(${index})">Sewa</button>
                </div>`;
        });
    }

    function simpanLaptop() {
        const n = document.getElementById('namaLaptop').value;
        const h = document.getElementById('hargaLaptop').value;
        const idx = document.getElementById('editIdx').value;

        if(!n || !h) return alert("Isi dulu bro!");

        if(idx === "") {
            dataLaptop.push({ nama: n, harga: parseInt(h) });
        } else {
            dataLaptop[idx] = { nama: n, harga: parseInt(h) };
            document.getElementById('editIdx').value = "";
            document.getElementById('btnSimpan').innerText = "Simpan Laptop";
        }
        
        document.getElementById('namaLaptop').value = "";
        document.getElementById('hargaLaptop').value = "";
        renderData();
    }

    function editLappy(i) {
        document.getElementById('namaLaptop').value = dataLaptop[i].nama;
        document.getElementById('hargaLaptop').value = dataLaptop[i].harga;
        document.getElementById('editIdx').value = i;
        document.getElementById('btnSimpan').innerText = "Update Data";
    }

    // Fitur Bayar User
    function pilihLappy(i) {
        document.getElementById('areaBayar').classList.remove('hidden');
        document.getElementById('infoSewa').innerText = "Bayar sewa: " + dataLaptop[i].nama;
    }

    function prosesBayar() {
        alert("Pembayaran Terkonfirmasi! Tugas Akhir aman!");
        document.getElementById('areaBayar').classList.add('hidden');
    }
</script>

</body>
</html>
